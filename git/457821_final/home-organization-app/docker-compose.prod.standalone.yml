# =====================================================
# Production Docker Compose - Standalone (Self-contained)
# =====================================================
# This file includes all services needed for production:
# - Backend API
# - Frontend (nginx)
# - PostgreSQL database
# - Redis (for caching/Celery)
#
# Usage:
#   docker-compose -f docker-compose.prod.standalone.yml up -d
#
# Environment variables:
#   Create a .env file with all required variables (see .env.example)
# =====================================================

version: "3.9"

services:
  # =====================================================
  # PostgreSQL Database
  # =====================================================
  db:
    image: postgres:16-alpine
    container_name: eli_maor_db
    hostname: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-eli_maor}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    # Security: Run as non-root (postgres user)
    user: "999:999"

  # =====================================================
  # Redis (for caching and Celery)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: eli_maor_redis
    hostname: redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # =====================================================
  # Backend API
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: eli-maor-backend:latest
    container_name: eli_maor_backend
    hostname: backend
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        until pg_isready -h db -U ${POSTGRES_USER:-postgres}; do sleep 2; done &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting API server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --access-log
      "
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-eli_maor}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - DEBUG=False
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5179,http://localhost:5178}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =====================================================
  # Celery Worker (Background Tasks)
  # =====================================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: eli-maor-backend:latest
    container_name: eli_maor_worker
    hostname: worker
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=1000
      --prefetch-multiplier=4
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-eli_maor}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  # =====================================================
  # Celery Beat (Scheduled Tasks)
  # =====================================================
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: eli-maor-backend:latest
    container_name: eli_maor_beat
    hostname: beat
    command: >
      celery -A app.workers.celery_app.celery beat
      --loglevel=info
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-eli_maor}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  # =====================================================
  # Frontend (nginx)
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8000/ws}
        - VITE_VAPID_PUBLIC_KEY=${VITE_VAPID_PUBLIC_KEY:-}
    image: eli-maor-frontend:latest
    container_name: eli_maor_frontend
    hostname: frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# =====================================================
# Networks
# =====================================================
networks:
  app-network:
    driver: bridge
    name: eli-maor-network

# =====================================================
# Volumes (Persistent Data)
# =====================================================
volumes:
  pg_data:
    driver: local
    name: eli-maor-pg-data
  redis_data:
    driver: local
    name: eli-maor-redis-data
